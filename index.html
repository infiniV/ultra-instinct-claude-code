<html lang="en" dir="ltr">

    <meta name="description" content="The best Claude Code tips from 50+ repos. No installation. No setup. Just read and apply." />
    <link rel="canonical" href="https://ultra-instinct-claude-code.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ultra Instinct Claude Code" />
    <meta property="og:description" content="The best Claude Code tips from 50+ repos. No installation. No setup. Just read and apply." />
    <meta property="og:url" content="https://ultra-instinct-claude-code.vercel.app/" />
    <meta property="og:image" content="https://ultra-instinct-claude-code.vercel.app/banner.png" />
    <meta property="og:site_name" content="Ultra Instinct Claude Code" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ultra Instinct Claude Code" />
    <meta name="twitter:description" content="The best Claude Code tips from 50+ repos. No installation. No setup. Just read and apply." />
    <meta name="twitter:image" content="https://ultra-instinct-claude-code.vercel.app/banner.png" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ultra Instinct Claude Code",
      "url": "https://ultra-instinct-claude-code.vercel.app",
      "description": "The best Claude Code tips from 50+ repos. No installation. No setup. Just read and apply.",
      "publisher": {
        "@type": "Organization",
        "name": "Infiniv"
      }
    }
    </script>

    <!-- Fonts: Plus Jakarta Sans (body) + Source Serif 4 (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function(){
        var s = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (s === 'dark' || (!s && d)) {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]').content = '#1e1c19';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
